bundle:
  name: engram-behavior
  version: 1.0.0
  description: Engram memory augmentation - RETRIEVEâ†’RESPONDâ†’CAPTURE protocol with automatic memory tracking

hooks:
  - module: hooks-protocol-reminder
    source: git+https://github.com/kenotron-ms/engram@main#subdirectory=modules/hooks-protocol-reminder
    config:
      priority: 5
      inject_role: system
      project_memory_base: ".canvas/memory"
      user_memory_base: "~/.canvas/memory"

  - module: hooks-memory-tracker
    source: git+https://github.com/kenotron-ms/engram@main#subdirectory=modules/hooks-memory-tracker
    config:
      priority: 90
      project_memory_base: ".canvas/memory"
      user_memory_base: "~/.canvas/memory"

context:
  include:
    - engram:AGENTS.md
    - engram:context/memory-system.md
    - engram:context/protocols/inline-capture.md
    - engram:context/protocols/knowledge-extraction.md
    - engram:context/protocols/dual-write-decision.md
    - engram:context/protocols/scope-routing.md
    - engram:context/protocols/cross-reference-cascade.md
    - engram:context/protocols/source-intake.md
